<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
              content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Audio Basser</title>
        <link rel="stylesheet" href="./css/style.css" type="text/css">
    </head>
    <body>
        <main class="app" id="app">
            <section class="player" aria-label="Music player">
                <header class="player__header">
                    <div class="brand">
                        <div class="brand__dot" aria-hidden="true"></div>
                        <div class="brand__text">
                            <div class="brand__title">Audio Basser</div>
                            <div class="brand__subtitle">Bass‑synced visualizer</div>
                        </div>
                    </div>

                    <div class="file-actions">
                        <input class="sr-only" type="file" id="audioInput" accept="audio/*">
                        <input class="sr-only" type="file" id="imageInput" accept="image/*">
                        <button class="btn btn--ghost" id="pickAudioBtn" type="button">Choose audio</button>
                        <button class="btn btn--ghost" id="pickImageBtn" type="button">Choose image</button>
                        <button class="btn btn--ghost" id="fullscreenBtn" type="button">Fullscreen</button>
                    </div>
                </header>

                <div class="player__content">
                    <div class="visual" id="visual" aria-label="Bass visualizer">
                        <div class="visual__stage" id="visualStage">
                            <img id="visualImage" class="visual__image visual__image--empty" alt="">
                            <div class="visual__surface" id="visualSurface" aria-hidden="true"></div>
                            <div class="visual__glow" aria-hidden="true"></div>
                        </div>

                        <div class="fs-controls" id="fsControls" aria-label="Fullscreen controls">
                            <button class="btn btn--primary" id="fsPlayPauseBtn" type="button" disabled>
                                <span class="btn__icon" aria-hidden="true">▶</span>
                                <span class="btn__label" id="fsPlayPauseLabel">Play</span>
                            </button>
                            <button class="btn" id="fsExitBtn" type="button">Exit</button>
                            <div class="fs-controls__spacer"></div>
                            <div class="fs-controls__time">
                                <span id="fsTimeCurrent">0:00</span>
                                <span class="seek__sep">/</span>
                                <span id="fsTimeTotal">0:00</span>
                            </div>
                        </div>
                    </div>

                    <div class="panel">
                        <div class="meta">
                            <div class="meta__title" id="trackTitle">No track loaded</div>
                            <div class="meta__subtitle" id="trackSubtitle">Upload an audio file to start</div>
                        </div>

                        <div class="seek">
                            <input
                                    class="seek__range"
                                    id="seekRange"
                                    type="range"
                                    min="0"
                                    max="1000"
                                    value="0"
                                    step="1"
                                    aria-label="Seek"
                            >
                            <div class="seek__time">
                                <span id="timeCurrent">0:00</span>
                                <span class="seek__sep">/</span>
                                <span id="timeTotal">0:00</span>
                            </div>
                        </div>

                        <div class="controls">
                            <button class="btn btn--primary" id="playPauseBtn" type="button" disabled>
                                <span class="btn__icon" aria-hidden="true">▶</span>
                                <span class="btn__label" id="playPauseLabel">Play</span>
                            </button>

                            <button class="btn" id="stopBtn" type="button" disabled>Stop</button>

                            <div class="controls__spacer"></div>

                            <label class="vol" aria-label="Volume">
                                <span class="vol__label">Vol</span>
                                <input class="vol__range" id="volumeRange" type="range" min="0" max="1" value="1" step="0.01">
                            </label>
                        </div>

                        <details class="advanced">
                            <summary class="advanced__summary">Visualizer</summary>
                            <div class="advanced__body">
                                <div class="group">
                                    <div class="group__title">Image (optional)</div>
                                    <p class="group__hint">Add a photo under the bass gradient — it animates together with the visualizer.</p>
                                    <div class="group__row">
                                        <button class="btn btn--ghost" id="pickImageBtnPanel" type="button">Choose image</button>
                                        <button class="btn btn--ghost" id="clearImageBtn" type="button" disabled>Remove image</button>
                                    </div>
                                </div>
                                <div class="group">
                                    <div class="group__title">Bass gradient</div>
                                    <label class="field field--row">
                                        <span class="field__label">Color A</span>
                                        <input class="field__color" id="gradColorA" type="color" value="#6cf0ff">
                                    </label>
                                    <label class="field field--row">
                                        <span class="field__label">Color B</span>
                                        <input class="field__color" id="gradColorB" type="color" value="#ff4fd8">
                                    </label>
                                    <label class="field">
                                        <span class="field__label">Angle</span>
                                        <input class="field__range" id="gradAngle" type="range" min="0" max="360" value="45" step="1">
                                    </label>
                                    <label class="field">
                                        <span class="field__label">Intensity</span>
                                        <input class="field__range" id="gradIntensity" type="range" min="0" max="1" value="0.7" step="0.01">
                                    </label>
                                </div>
                                <label class="field">
                                    <span class="field__label">Bass sensitivity</span>
                                    <input class="field__range" id="sensitivityRange" type="range" min="0.5" max="2.5"
                                           value="1.4" step="0.01">
                                </label>
                                <label class="field">
                                    <span class="field__label">Smoothing</span>
                                    <input class="field__range" id="smoothingRange" type="range" min="0" max="0.95" value="0.75"
                                           step="0.01">
                                </label>
                            </div>
                        </details>
                    </div>
                </div>
            </section>
        </main>

        <audio id="audio" crossorigin="anonymous"></audio>
        <script src="./js/script.js" type="text/javascript"></script>
    </body>
</html>
